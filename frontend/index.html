    <style>
      @keyframes bubble-float {
        0%, 100% { transform: translate(-50%, -50%) translate(0, 0); }
        33% { transform: translate(-50%, -50%) translate(2px, -4px); }
        66% { transform: translate(-50%, -50%) translate(-3px, 3px); }
      }
      .bubble-float {
        animation: bubble-float var(--float-duration, 8s) ease-in-out infinite;
        animation-delay: var(--float-delay, 0s);
      }
      @media (prefers-reduced-motion: reduce) {
        .bubble-float {
          animation: none !important;
        }
      }
    </style>

<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Hidden form so Netlify's deploy bot can detect it (required for React SPAs) -->
